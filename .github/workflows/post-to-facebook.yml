name: Post Confessions to Facebook

on:
  # 11:00 AM Bangkok (UTC+7) = 04:00 UTC
  # 07:00 PM Bangkok (UTC+7) = 12:00 UTC
  schedule:
    - cron: "0 4 * * *"   # 11:00 AM (UTC+7)
    - cron: "0 12 * * *"  # 07:00 PM (UTC+7)

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  post:
    name: Post to Facebook Page
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run post-to-facebook script
        run: npm run post-to-facebook
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
